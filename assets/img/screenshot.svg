  <text x="40" y="42" font-family="Arial" font-weight="700" font-size="20" fill="#0A0A0A">Studio<tspan fill="#7B2FF7">Web</tspan></text>
  <!-- Hero -->
  <text x="640" y="240" font-family="Georgia,serif" font-weight="700" font-size="64" fill="#0A0A0A" text-anchor="middle">Your website,</text>
  <text x="640" y="316" font-family="Georgia,serif" font-weight="700" font-size="64" fill="#C9A84C" font-style="italic" text-anchor="middle">reinvented.</text>
  <text x="640" y="380" font-family="Arial" font-size="20" fill="#555" text-anchor="middle">Three styles, one ambition: make you stand out.</text>
  <rect x="520" y="420" width="240" height="52" rx="26" fill="#0A0A0A"/>
  <text x="640" y="452" font-family="Arial" font-weight="600" font-size="16" fill="#fff" text-anchor="middle">Browse examples</text>
